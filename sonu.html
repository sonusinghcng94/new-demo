<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Product Listing</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <!-- Header -->
  <header class="bg-danger text-white text-center py-4">
    <h1>Shop</h1>
  </header>

  <!-- Product Section -->
  <div class="container my-5">
    <div class="row">

      <!-- Product 1 -->
      <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
        <div class="card h-100 text-center">
          <img src="https://via.placeholder.com/200" class="card-img-top" alt="Product 1">
          <div class="card-body">
            <h5 class="card-title">Product One</h5>
            <p class="card-text">$20</p>
            <button class="btn btn-warning">Add to Cart</button>
          </div>
        </div>
      </div>

      <!-- Product 2 -->
      <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
        <div class="card h-100 text-center">
          <img src="https://via.placeholder.com/200" class="card-img-top" alt="Product 2">
          <div class="card-body">
            <h5 class="card-title">Product Two</h5>
            <p class="card-text">$30</p>
            <button class="btn btn-warning">Add to Cart</button>
          </div>
        </div>
      </div>

      <!-- Product 3 -->
      <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
        <div class="card h-100 text-center">
          <img src="https://via.placeholder.com/200" class="card-img-top" alt="Product 3">
          <div class="card-body">
            <h5 class="card-title">Product Three</h5>
            <p class="card-text">$40</p>
            <button class="btn btn-warning">Add to Cart</button>
          </div>
        </div>
      </div>

      <!-- Product 4 -->
      <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
        <div class="card h-100 text-center">
          <img src="https://via.placeholder.com/200" class="card-img-top" alt="Product 4">
          <div class="card-body">
            <h5 class="card-title">Product Four</h5>
            <p class="card-text">$50</p>
            <button class="btn btn-warning">Add to Cart</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3">
    <p>©️ 2026 Your Store</p>
  </footer>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<style>
h1 {
    font-family: Arial, sans-serif;
    font-size: 36px;
    color: blue;
    font-weight: bold;
    font-style: italic; /* bold + italic */
}

h2 {
    font-family: Georgia, serif;
    font-size: 28px;
    color: green;
}

p {
    font-family: Verdana, sans-serif;
    font-size: 18px;
    color: #555;
}

a {
    color: orangered;
}
</style>
</head>
<body>

<h1>Main Heading</h1>
<h2>Sub Heading</h2>
<p>This is a paragraph.</p>
<a href="#">Click here</a>

</body>
</html>

<html>
<head>
<style>
.box {
    border: 2px solid black;
    padding: 20px;
    margin: 20px;
}

.dashed {
    border: 2px dashed red;
}

.dotted {
    border: 2px dotted blue;
}
</style>
</head>
<body>

<div class="box">Manipal</div>
<div class="box dashed">Manipal</div>
<div class="box dotted">Manipal</div>

</body>
</html>

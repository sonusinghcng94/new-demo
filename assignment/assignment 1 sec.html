<!DOCTYPE html>
<html>
<head>
<style>
ul {
    list-style-type:square;/* Custom bullet style */
    padding-left: 20px;
}

li {
    color: purple;
    font-size: 18px;
}

li:hover {
    color: orange; /* Changes color on hover */
}
</style>
</head>
<body>

<ul>
    <li>Apple</li>
    <li>Banana</li>
    <li>Mango</li>
</ul>

</body>
</html>

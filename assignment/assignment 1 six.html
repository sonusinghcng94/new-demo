<!DOCTYPE html>
<html>
<head>
<style>
.card {
    background-color: #f4f4f4;
    padding: 20px;
    margin: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
    width: 250px;
}

.card h3 {
    color: darkblue;
}

.card p {
    color: #333;
}

.card:hover {
    box-shadow: 0 0 20px black;
    background-color: #e0e0e0;
}
</style>
</head>
<body>

<div class="card">
    <h3>Manipal</h3>
    <p>This is indian university</p>
</div>

</body>
</html>
